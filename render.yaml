services:
  - type: web
    plan: free
    runtime: image
    name: n8n-mojo-automation
    image:
      url: docker.io/n8nio/n8n:latest

    envVars:
      - key: N8N_ENCRYPTION_KEY
        generateValue: true

      - key: PORT
        value: "5678"
      - key: N8N_PORT
        value: "5678"

      # Database Configuration - Sharing with Chatbot Logs
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        value: dpg-d78abf94tr6s73bvp4gg-a.singapore-postgres.render.com
      - key: DB_POSTGRESDB_PORT
        value: "5432"
      - key: DB_POSTGRESDB_DATABASE
        value: chatbotlogs
      - key: DB_POSTGRESDB_USER
        value: SnoChxBdOP8PowQUESmIJ01Bkb1X8RXk
      - key: DB_POSTGRESDB_PASSWORD
        value: SnoChxBdOP8PowQUESmIJ01Bkb1X8RXk
      
      # Required for Render external connections
      - key: DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED
        value: "false"

      # Recommended: Keep n8n logs light so your chat logs have room to grow
      - key: EXECUTIONS_DATA_PRUNE
        value: "true"
      - key: EXECUTIONS_DATA_MAX_AGE
        value: "72" # Prune n8n history after 3 days
