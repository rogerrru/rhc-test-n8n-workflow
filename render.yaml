services:
  - type: web
    plan: free
    runtime: image
    name: n8n-mojo-automation
    image:
      url: docker.io/n8nio/n8n:latest

    envVars:
      # n8n encryption key - Render will generate this for you on first deploy
      - key: N8N_ENCRYPTION_KEY
        generateValue: true

      # Database Configuration using your 'chatbotlogs' DB
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        value: dpg-d78abf94tr6s73bvp4gg-a # Internal Host
      - key: DB_POSTGRESDB_DATABASE
        value: chatbotlogs
      - key: DB_POSTGRESDB_USER
        value: chatbotlogs_user
      - key: DB_POSTGRESDB_PASSWORD
        value: SnoChxBdOP8PowQUESmIJ01Bkb1X8RXk
      - key: DB_POSTGRESDB_PORT
        value: "5432"

      # Essential for Webhooks to work correctly
      - key: WEBHOOK_URL
        sync: false # Set this in the Render Dashboard after deployment to match your service URL

      # Optimization for Free Tier memory limits
      - key: N8N_METRICS
        value: "true"
      - key: EXECUTIONS_DATA_PRUNE
        value: "true"
      - key: EXECUTIONS_DATA_MAX_AGE
        value: "168" # Retain logs for 7 days to save DB space
